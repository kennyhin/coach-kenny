<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Receipt → PDF Filler</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Inter', sans-serif;
    background: #0B0B0B;
    color: #e5e7eb;
    min-height: 100vh;
    padding-bottom: 40px;
  }
  .header {
    background: rgba(11,11,11,0.95);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    padding: 24px 32px;
    position: sticky; top: 0; z-index: 50;
    backdrop-filter: blur(12px);
  }
  .inner { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; gap: 24px; }
  .logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.4rem; font-weight: 800;
    color: #fff; text-decoration: none;
  }
  .logo span { color: #8CC63F; }
  .title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem; font-weight: 700;
    color: #8CC63F; text-transform: uppercase;
    letter-spacing: 0.1em; flex: 1; text-align: center;
  }
  main { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 24px; }
  .panel {
    background: #16191f;
    border: 1px solid rgba(140,198,63,0.15);
    border-radius: 16px;
    padding: 24px;
  }
  .panel-head {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 14px;
  }
  .panel-icon { font-size: 28px; }
  .panel-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px; font-weight: 900;
    text-transform: uppercase; color: #fff;
  }
  .field { margin-bottom: 12px; }
  .label {
    display: block;
    font-size: 12px; font-weight: 700;
    color: #8CC63F; text-transform: uppercase;
    letter-spacing: 0.08em; margin-bottom: 6px;
  }
  input, textarea, select {
    width: 100%;
    background: #0B0B0B;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 12px 14px;
    color: #fff; font-family: inherit; font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  input:focus, textarea:focus, select:focus { border-color: #8CC63F; }
  textarea { min-height: 80px; resize: vertical; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 720px) { .grid-2 { grid-template-columns: 1fr; } }
  .drop {
    border: 1px dashed rgba(255,255,255,0.15);
    border-radius: 14px;
    padding: 24px 16px;
    text-align: center;
    color: #9ca3af;
    background: rgba(11,11,11,0.4);
    cursor: pointer;
    transition: all 0.15s;
  }
  .drop:hover { border-color: #8CC63F; color: #8CC63F; }
  .drop input { display: none; }
  .actions { display: flex; gap: 12px; margin-top: 14px; flex-wrap: wrap; }
  .btn {
    background: #8CC63F; color: #0B0B0B;
    border: none; border-radius: 10px;
    padding: 12px 16px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800; font-size: 16px;
    text-transform: uppercase;
    cursor: pointer;
    transition: transform 0.15s, background 0.15s;
  }
  .btn:hover { background: #9CD85A; transform: translateY(-1px); }
  .btn-secondary {
    background: transparent;
    color: #e5e7eb;
    border: 1px solid rgba(255,255,255,0.12);
  }
  .btn-secondary:hover { border-color: #8CC63F; color: #8CC63F; background: transparent; }
  .preview {
    margin-top: 10px;
    border-radius: 12px;
    overflow: hidden;
    background: #0B0B0B;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .preview img { width: 100%; display: block; }
  .status { margin-top: 10px; font-size: 13px; color: #9ca3af; font-family: 'Space Mono', monospace; }
  .hint { font-size: 12px; color: #9ca3af; margin-top: 6px; }
  .items { display: flex; flex-direction: column; gap: 10px; }
  .item-row {
    display: grid;
    grid-template-columns: 1fr 100px 80px 60px;
    gap: 10px;
    align-items: center;
  }
  @media (max-width: 640px) { .item-row { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<header class="header">
  <div class="inner">
    <a class="logo" href="#">📝 <span>Receipt</span> Filler</a>
    <div class="title">Manual Fill + OCR Assist</div>
  </div>
</header>

<main>
  <div class="grid">
    <section class="panel" id="form-purchase">
      <div class="panel-head">
        <div class="panel-icon">🛒</div>
        <div class="panel-title">Purchase Request</div>
      </div>

      <div class="field">
        <label class="label">Snap or upload receipt</label>
        <label class="drop">
          <input type="file" accept="image/*" capture="environment" onchange="onReceipt(this, 'purchase')" />
          📷 Tap to take a photo / upload
        </label>
      </div>
      <div class="preview" id="preview-purchase" style="display:none">
        <img id="img-purchase" alt="receipt" />
      </div>
      <div class="status" id="status-purchase"></div>
      <div class="hint">First, take a receipt photo for auto-fill. Then adjust values below.</div>

      <div class="grid-2" style="margin-top:16px">
        <div class="field">
          <label class="label">Date Submitted</label>
          <input type="date" id="pr-date" />
        </div>
        <div class="field">
          <label class="label">Cost Center / Team</label>
          <input type="text" id="pr-team" placeholder="e.g. Soccer, Kinder-UCKHANAN" />
        </div>
      </div>

      <div class="field">
        <label class="label">Requested By</label>
        <input type="text" id="pr-name" placeholder="Kenny Ho" />
      </div>

      <div class="field">
        <label class="label">Shipping Instructions</label>
        <textarea id="pr-shipping" placeholder="Shipping address or notes — leave blank if not needed"></textarea>
      </div>

      <div class="field">
        <label class="label">Items</label>
        <div class="items" id="pr-items">
          <div class="item-row">
            <input placeholder="Item description" class="item-desc" />
            <input type="number" step="0.01" placeholder="Unit price" class="item-price" />
            <input type="number" step="0.01" placeholder="Qty" class="item-qty" value="1" />
            <input type="number" step="0.01" placeholder="Line total" class="item-total" />
          </div>
        </div>
        <button class="btn btn-secondary" style="margin-top:10px" onclick="addItem('pr-items')">+ Add item</button>
      </div>

      <div class="grid-2">
        <div class="field">
          <label class="label">Subtotal</label>
          <input type="number" step="0.01" id="pr-subtotal" placeholder="0.00" />
        </div>
        <div class="field">
          <label class="label">Shipping</label>
          <input type="number" step="0.01" id="pr-shipping-amt" placeholder="0.00" />
        </div>
      </div>

      <div class="field">
        <label class="label">Total</label>
        <input type="number" step="0.01" id="pr-total" placeholder="0.00" />
      </div>

      <div class="actions">
        <button class="btn" onclick="generatePDF('purchase')">Download PDF</button>
        <button class="btn btn-secondary" onclick="refill('purchase')">Refill from receipt</button>
      </div>
    </section>

    <section class="panel" id="form-reimbursement">
      <div class="panel-head">
        <div class="panel-icon">💵</div>
        <div class="panel-title">Reimbursement</div>
      </div>

      <div class="field">
        <label class="label">Snap or upload receipt</label>
        <label class="drop">
          <input type="file" accept="image/*" capture="environment" onchange="onReceipt(this, 'reimbursement')" />
          📷 Tap to take a photo / upload
        </label>
      </div>
      <div class="preview" id="preview-reimbursement" style="display:none">
        <img id="img-reimbursement" alt="receipt" />
      </div>
      <div class="status" id="status-reimbursement"></div>
      <div class="hint">Photo is optional — fill manually below and download.</div>

      <div class="grid-2" style="margin-top:16px">
        <div class="field">
          <label class="label">Employee Name</label>
          <input type="text" id="rr-name" placeholder="Kenny Ho" />
        </div>
        <div class="field">
          <label class="label">Date</label>
          <input type="date" id="rr-date" />
        </div>
      </div>

      <div class="grid-2">
        <div class="field">
          <label class="label">Vendor / Store</label>
          <input type="text" id="rr-vendor" placeholder="Store name" />
        </div>
        <div class="field">
          <label class="label">Amount</label>
          <input type="number" step="0.01" id="rr-amount" placeholder="0.00" />
        </div>
      </div>

      <div class="field">
        <label class="label">Purpose / Description</label>
        <textarea id="rr-purpose" placeholder="What was this purchase for?"></textarea>
      </div>

      <div class="field">
        <label class="label">Account / Cost Center</label>
        <input type="text" id="rr-cost" placeholder="e.g. Soccer, Kinder-UCKHANAN" />
      </div>

      <div class="actions">
        <button class="btn" onclick="generatePDF('reimbursement')">Download PDF</button>
        <button class="btn btn-secondary" onclick="refill('reimbursement')">Refill from receipt</button>
      </div>
    </section>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<script>
function fillToday(id) {
  const d = new Date().toISOString().split('T')[0];
  const el = document.getElementById(id);
  if (el) el.value = d;
}
fillToday('pr-date');
fillToday('rr-date');

function onReceipt(input, type) {
  if (!input.files || !input.files[0]) return;
  const id = type === 'purchase' ? 'preview-purchase' : 'preview-reimbursement';
  const img = type === 'purchase' ? 'img-purchase' : 'img-reimbursement';
  const status = type === 'purchase' ? 'status-purchase' : 'status-reimbursement';
  document.getElementById(id).style.display = 'block';
  document.getElementById(img).src = URL.createObjectURL(input.files[0]);
  document.getElementById(status).textContent = 'Reading receipt…';
  document.getElementById(status).style.color = '#8CC63F';
  runOCR(type, input.files[0]);
}

async function runOCR(type, file) {
  const statusId = type === 'purchase' ? 'status-purchase' : 'status-reimbursement';
  const status = document.getElementById(statusId);
  try {
    const result = await Tesseract.recognize(file, 'eng', { logger: m => {
      if (m.status === 'recognizing text') {
        const pct = Math.round((m.progress || 0) * 100);
        status.textContent = 'Reading receipt… ' + pct + '%';
      } else {
        status.textContent = m.status;
      }
    }});
    window.__ocr = window.__ocr || {};
    window.__ocr[type] = result.data.text;
    status.textContent = 'Receipt read ✔ — values updated where possible.';
    parseAndFill(type);
  } catch (err) {
    status.textContent = 'OCR failed: ' + err.message;
    status.style.color = '#E31837';
  }
}

function parseAndFill(type) {
  const text = (window.__ocr && window.__ocr[type]) || '';
  if (!text) return;
  if (type === 'purchase') {
    const m = text.match(/\d{2,4}[-\/]\d{1,2}[-\/]\d{1,2}/);
    if (m) document.getElementById('pr-date').value = toISODate(m[0]);
    const nums = text.match(/(\d+\.\d{2})/g);
    if (nums && nums.length) document.getElementById('pr-total').value = nums[nums.length - 1];
  } else {
    const m = text.match(/\d{2,4}[-\/]\d{1,2}[-\/]\d{1,2}/);
    if (m) document.getElementById('rr-date').value = toISODate(m[0]);
    const nums = text.match(/(\d+\.\d{2})/g);
    if (nums && nums.length) document.getElementById('rr-amount').value = nums[nums.length - 1];
    const lines = text.split(/\n/).filter(l => /[A-Z]/.test(l) && l.trim().length > 3);
    if (lines[0]) document.getElementById('rr-vendor').value = lines[0].trim();
  }
}

function refill(type) {
  const img = type === 'purchase' ? 'img-purchase' : 'img-reimbursement';
  const el = document.getElementById(img);
  if (!el || !el.src) { alert('Take or upload a receipt photo first.'); return; }
  parseAndFill(type);
}

function toISODate(str) {
  try {
    const d = new Date(str);
    return isNaN(d) ? '' : d.toISOString().split('T')[0];
  } catch (e) { return ''; }
}

function addItem(containerId) {
  const c = document.getElementById(containerId);
  const row = document.createElement('div');
  row.className = 'item-row';
  row.innerHTML = '<input placeholder="Item description" class="item-desc" /><input type="number" step="0.01" placeholder="Unit price" class="item-price" /><input type="number" step="0.01" placeholder="Qty" class="item-qty" value="1" /><input type="number" step="0.01" placeholder="Line total" class="item-total" />';
  c.appendChild(row);
}

function fieldText(id) {
  const el = document.getElementById(id);
  return el ? (el.value || '').trim() : '';
}

function generatePDF(type) {
  try {
    const { PDFDocument, rgb, StandardFonts } = PDFLib;
    const doc = PDFDocument.create();
    const font = doc.registerFont(StandardFonts.Helvetica);
    const page = doc.addPage([612, 792]);
    let y = 720;
    const black = rgb(0.11, 0.11, 0.11);
    const green = rgb(0.545, 0.776, 0.247);

    page.drawText(type === 'purchase' ? 'PURCHASE REQUEST' : 'REIMBURSEMENT REQUEST', { x: 72, y, size: 18, font, color: black });
    y -= 42;

    function field(label, value) {
      value = (value || '').trim();
      if (!value) return;
      if (y < 90) { doc.addPage(); y = 720; }
      page.drawText(label + ':', { x: 72, y, size: 11, font, color: black });
      page.drawText(value, { x: 180, y, size: 11, font, color: black });
      y -= 22;
    }

    if (type === 'purchase') {
      field('Date Submitted', fieldText('pr-date'));
      field('Name', fieldText('pr-name'));
      field('Team / Cost Center', fieldText('pr-team'));
      field('Shipping', fieldText('pr-shipping'));
      field('Subtotal', fieldText('pr-subtotal'));
      field('Shipping', fieldText('pr-shipping-amt'));
      field('Total', fieldText('pr-total'));
    } else {
      field('Employee Name', fieldText('rr-name'));
      field('Date', fieldText('rr-date'));
      field('Vendor / Store', fieldText('rr-vendor'));
      field('Amount', fieldText('rr-amount'));
      field('Purpose', fieldText('rr-purpose'));
      field('Account', fieldText('rr-cost'));
    }

    const bytes = await doc.save();
    const blob = new Blob([bytes], { type: 'application/pdf' });
    downloadBlob(blob, (type === 'purchase' ? 'purchase-request' : 'reimbursement') + '.pdf');
  } catch (err) {
    alert('PDF generation failed: ' + err.message);
    console.error(err);
  }
}

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}
</script>
</body>
</html>
