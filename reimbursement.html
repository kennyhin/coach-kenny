<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>SLAM Nevada Coach Reimbursement</title>
  <meta name="description" content="Reimbursement form generator for SLAM Nevada Athletics coaches." />
  <link rel="stylesheet" href="css/reimbursement.css" />
  <link rel="icon" type="image/png" href="slam-logo.png" />
</head>
<body>
<div class="app">
  <header class="app-header">
    <div class="app-header-inner">
      <img src="slam-logo.png" alt="SLAM Nevada" />
      <div>
        <h1>SLAM Nevada Reimbursement</h1>
        <p>Coach Reimbursement Form</p>
      </div>
    </div>
  </header>

  <div class="step-bar">
    <div class="step-bar-inner" id="step-bar"></div>
  </div>

  <main class="app-main">
    <div class="app-main-inner">
      <div id="js-status" class="error-banner" style="display:none"></div>

      <!-- Upload -->
      <div id="screen-receipt" class="screen screen-visible">
        <div class="upload-zone" id="upload-zone">
          <svg class="upload-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 16v-8m0 0l-3 3m3-3l3 3M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2" />
          </svg>
          <p class="upload-title">Upload a Receipt</p>
          <p class="upload-sub">Drag and drop a photo, or click to browse</p>
          <div class="upload-actions">
            <label class="btn btn-primary" id="choose-file-label">
              Choose File
              <input type="file" id="file-input" accept="image/*" capture="environment" style="display:none" />
            </label>
            <button type="button" class="btn btn-ghost" onclick="app.skipUpload()">Skip — fill manually</button>
          </div>
        </div>
        <div id="preview-wrap" class="preview" style="display:none;margin-top:16px">
          <img id="receipt-img" alt="Receipt preview" />
        </div>
        <div id="ocr-status" class="ocr-status">
          <span class="ocr-spinner" id="ocr-spinner"></span>
          <span id="ocr-status-text">Reading receipt…</span>
        </div>
        <div class="actions" id="receipt-actions" style="display:none">
          <button type="button" class="btn btn-ghost" onclick="app.skipUpload()">Skip</button>
          <button type="button" class="btn btn-primary" id="receipt-next-btn" onclick="app.nextFromReceipt()">Continue</button>
        </div>
      </div>

      <!-- Form -->
      <div id="screen-form" class="screen">
        <div class="card">
          <div id="step-area"></div>
          <div class="actions">
            <button type="button" class="btn btn-ghost" onclick="app.stepBack()">Back</button>
            <button type="button" class="btn btn-primary" onclick="app.stepNext()">Continue</button>
          </div>
        </div>
      </div>

      <!-- Download -->
      <div id="screen-download" class="screen">
        <div class="card done-card">
          <div class="done-icon">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
            </svg>
          </div>
          <h2 class="card-title">Reimbursement Ready</h2>
          <p class="card-sub">Download the PDF and email it to Kenny Hin, Athletic Director.</p>
          <div class="actions" style="justify-content:center">
            <button type="button" class="btn btn-primary" onclick="app.generatePDF()">Download PDF</button>
          </div>
          <div class="actions" style="justify-content:center;margin-top:8px">
            <button type="button" class="btn btn-outline" onclick="app.sendToAD()">Send to Athletic Director</button>
          </div>
          <div class="actions" style="justify-content:center;margin-top:8px">
            <button type="button" class="btn btn-ghost" onclick="app.resetAll()">Start Another Form</button>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>
(function () {
  'use strict';

  var STEPS = [
    { key: 'upload', label: 'Upload' },
    { key: 'info', label: 'Info' },
    { key: 'items', label: 'Items' },
    { key: 'download', label: 'Download' },
  ];

  var FORM_STEPS = [
    {
      title: 'Your Info',
      sub: 'Basic details for the reimbursement form.',
      container: 'rr-basic',
      fields: [
        { id: 'rr-date', label: 'Date', type: 'date' },
        { id: 'rr-name', label: 'Your Name', placeholder: 'First and last name' },
        { id: 'rr-sportteam', label: 'Sport Team', type: 'sportteam' },
        { id: 'rr-position', label: 'Position', placeholder: 'Coach, Assistant Coach, etc.' },
      ]
    },
    {
      title: 'Line Items',
      sub: 'Enter each purchase from your receipt.',
      container: 'rr-items',
      items: true
    }
  ];

  var ITEM_COLS = [
    { key: 'vendor', label: 'Vendor', placeholder: 'Store' },
    { key: 'desc', label: 'Description', placeholder: 'What you bought' },
    { key: 'qty', label: 'Qty', type: 'number', defVal: '1', step: '1' },
    { key: 'amount', label: 'Amount', type: 'number', placeholder: '0.00', step: '0.01' },
  ];

  var AD_EMAIL = 'kenny.hin@slamnv.org';
  var TODAY = new Date().toISOString().slice(0, 10);
  var STATE = { step: 0, values: {}, ocrRunning: false, scanned: false };

  function $(id) { return document.getElementById(id); }

  function buildSportTeam(vals) {
    var parts = ['Slam'];
    if (vals['rr-grade']) parts.push(vals['rr-grade']);
    if (vals['rr-sport']) parts.push(vals['rr-sport']);
    var base = parts.join(' ');
    if (vals['rr-coach']) base += ' (' + vals['rr-coach'] + ')';
    return base;
  }

  function getStepIndex() {
    var screen = getVisibleScreen();
    if (screen === 'screen-receipt') return 0;
    if (screen === 'screen-form') return STATE.step + 1;
    if (screen === 'screen-download') return 3;
    return 0;
  }

  function getVisibleScreen() {
    var ids = ['screen-receipt', 'screen-form', 'screen-download'];
    for (var i = 0; i < ids.length; i++) {
      var el = $(ids[i]);
      if (el && el.classList.contains('screen-visible')) return ids[i];
    }
    return 'screen-receipt';
  }

  function renderStepBar() {
    var idx = getStepIndex();
    var bar = $('step-bar');
    bar.innerHTML = '';
    STEPS.forEach(function (s, i) {
      var wrap = document.createElement('div');
      wrap.className = 'step-node-wrap';
      var done = i < idx;
      var active = i === idx;
      var node = document.createElement('div');
      node.className = 'step-node';
      var circle = document.createElement('div');
      circle.className = 'step-circle ' + (done ? 'done' : active ? 'active' : 'pending');
      circle.textContent = done ? '✓' : String(i + 1);
      var label = document.createElement('span');
      label.className = 'step-label ' + (done ? 'done' : active ? 'active' : 'pending');
      label.textContent = s.label;
      node.appendChild(circle);
      node.appendChild(label);
      wrap.appendChild(node);
      if (i < STEPS.length - 1) {
        var line = document.createElement('div');
        line.className = 'step-line' + (i < idx ? ' done' : '');
        wrap.appendChild(line);
      }
      bar.appendChild(wrap);
    });
  }

  function show(id) {
    ['screen-receipt', 'screen-form', 'screen-download'].forEach(function (n) {
      var el = $(n);
      if (!el) return;
      if (n === id) { el.classList.add('screen-visible'); el.classList.remove('screen'); }
      else { el.classList.add('screen'); el.classList.remove('screen-visible'); }
    });
    renderStepBar();
    var w = $('js-status');
    if (w) w.style.display = 'none';
  }

  function skipUpload() {
    STATE.scanned = false;
    STATE.step = 0;
    show('screen-form');
    buildStep();
  }

  function nextFromReceipt() {
    show('screen-form');
    buildStep();
  }

  function resetUploadUi() {
    $('preview-wrap').style.display = 'none';
    $('receipt-actions').style.display = 'none';
    $('receipt-img').src = '';
    $('upload-zone').style.display = 'flex';
    setOcrStatus(null);
    var input = $('file-input');
    if (input) input.value = '';
  }

  function setupUpload() {
    var zone = $('upload-zone');
    var input = $('file-input');
    zone.addEventListener('dragover', function (e) { e.preventDefault(); });
    zone.addEventListener('drop', function (e) {
      e.preventDefault();
      if (e.dataTransfer.files && e.dataTransfer.files[0]) onPhoto(e.dataTransfer.files[0]);
    });
    input.addEventListener('change', function () {
      if (input.files && input.files[0]) onPhoto(input.files[0]);
    });
  }

  function onPhoto(file) {
    STATE.scanned = true;
    $('upload-zone').style.display = 'none';
    $('preview-wrap').style.display = 'block';
    $('receipt-actions').style.display = 'flex';
    $('receipt-img').src = URL.createObjectURL(file);
    runOCR(file);
  }

  function stepBack() {
    if (STATE.step === 0) {
      show('screen-receipt');
      return;
    }
    STATE.step -= 1;
    buildStep();
  }

  function stepNext() {
    saveStep();
    STATE.step += 1;
    if (STATE.step >= FORM_STEPS.length) {
      show('screen-download');
      return;
    }
    buildStep();
  }

  function setOcrStatus(mode, text) {
    var box = $('ocr-status');
    var spinner = $('ocr-spinner');
    var nextBtn = $('receipt-next-btn');
    if (!box) return;
    if (!mode) { box.style.display = 'none'; return; }
    box.style.display = 'flex';
    box.classList.toggle('err', mode === 'error');
    if (spinner) spinner.style.display = mode === 'running' ? 'block' : 'none';
    $('ocr-status-text').textContent = text || '';
    if (nextBtn) {
      nextBtn.disabled = mode === 'running';
      nextBtn.textContent = mode === 'running' ? 'Reading…' : 'Continue';
    }
  }

  function downscaleImage(file, maxDim) {
    return new Promise(function (resolve, reject) {
      var img = new Image();
      img.onload = function () {
        var scale = Math.min(1, maxDim / Math.max(img.width, img.height));
        var canvas = document.createElement('canvas');
        canvas.width = Math.round(img.width * scale);
        canvas.height = Math.round(img.height * scale);
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        URL.revokeObjectURL(img.src);
        resolve(canvas);
      };
      img.onerror = function () { reject(new Error('Could not load image')); };
      img.src = URL.createObjectURL(file);
    });
  }

  async function runOCR(file) {
    if (typeof Tesseract === 'undefined') {
      setOcrStatus('error', 'OCR unavailable — you can still fill in manually.');
      return;
    }
    setOcrStatus('running', 'Reading receipt…');
    try {
      var canvas = await downscaleImage(file, 1600);
      var result = await Tesseract.recognize(canvas, 'eng');
      applyOcrResults(parseReceiptText((result.data && result.data.text) || ''));
      setOcrStatus('done', 'Receipt read — review fields on the next screens.');
    } catch (e) {
      setOcrStatus('error', 'Could not read receipt — fill in manually on the next screens.');
    }
  }

  function normalizeDate(str) {
    var m = str.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
    if (m) {
      var yyyy = m[3].length === 2 ? '20' + m[3] : m[3];
      return yyyy + '-' + m[1].padStart(2, '0') + '-' + m[2].padStart(2, '0');
    }
    return /^\d{4}-\d{2}-\d{2}$/.test(str) ? str : '';
  }

  function parseReceiptText(text) {
    var lines = text.split('\n').map(function (l) { return l.trim(); }).filter(Boolean);
    var result = { vendor: '', date: '', total: '', tax: '', items: [] };
    for (var i = 0; i < lines.length; i++) {
      var l = lines[i];
      if (l.length > 2 && !/^\d+$/.test(l) && !/^www\./i.test(l)) {
        result.vendor = l.replace(/[^\w&'.,\- ]/g, '').trim();
        if (result.vendor) break;
      }
    }
    var dateMatch = text.match(/\b(\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4}|\d{4}-\d{2}-\d{2})\b/);
    if (dateMatch) result.date = normalizeDate(dateMatch[1]);
    var moneyRe = /\$?\s?(\d{1,4}(?:,\d{3})*\.\d{2})/;
    var skipWords = /\b(total|tax|subtotal|change|cash|visa|card|balance|due|invoice|date|phone|www\.|shipping)\b/i;
    lines.forEach(function (line) {
      var lower = line.toLowerCase();
      var m = line.match(moneyRe);
      if (!m) return;
      var amt = m[1].replace(/,/g, '');
      if (/sub[\s-]?total/.test(lower)) return;
      if (/\btax\b/.test(lower)) { result.tax = amt; return; }
      if (/\b(total|amount due|balance due)\b/.test(lower)) { result.total = amt; }
    });
    lines.forEach(function (line) {
      if (skipWords.test(line.toLowerCase())) return;
      var m = line.match(/^(.+?)\s+\$?(\d{1,4}(?:,\d{3})*\.\d{2})\s*$/);
      if (m) {
        var desc = m[1].replace(/[-.]{2,}/g, '').replace(/\s{2,}/g, ' ').trim();
        if (desc.length > 1 && desc.length < 60 && /[a-zA-Z]{2,}/.test(desc)) {
          result.items.push({ desc: desc, amount: m[2].replace(/,/g, '') });
        }
      }
    });
    return result;
  }

  function applyOcrResults(parsed) {
    if (parsed.date) { STATE.values['rr-date'] = parsed.date; STATE.values['_ocr_rr-date'] = true; }
    if (parsed.items.length) {
      STATE.values['items'] = parsed.items.map(function (it) {
        return { vendor: parsed.vendor || '', desc: it.desc, qty: '1', amount: it.amount };
      });
      STATE.values['_ocr_items'] = true;
    } else if (parsed.vendor) {
      STATE.values['items'] = [{ vendor: parsed.vendor, desc: '', qty: '1', amount: parsed.total || '' }];
      STATE.values['_ocr_items'] = true;
    }
    if (parsed.tax) { STATE.values['rr-tax'] = parsed.tax; STATE.values['_ocr_rr-tax'] = true; }
  }

  function saveStep() {
    var s = FORM_STEPS[STATE.step];
    if (!s) return;
    var root = $(s.container);
    if (!root) return;
    if (s.items) {
      var rows = [];
      Array.prototype.forEach.call(root.querySelectorAll('tbody tr'), function (row) {
        var item = {};
        Array.prototype.forEach.call(row.querySelectorAll('input[data-key]'), function (el) {
          item[el.getAttribute('data-key')] = (el.value || '').trim();
        });
        rows.push(item);
      });
      STATE.values['items'] = rows;
      Array.prototype.forEach.call(root.querySelectorAll('input[data-field]'), function (el) {
        STATE.values[el.getAttribute('data-field')] = (el.value || '').trim();
      });
      STATE.values['_subtotal'] = (root.querySelector('.subtotal-val') || {}).textContent || '0.00';
      STATE.values['_total'] = (root.querySelector('.total-val') || {}).textContent || '0.00';
    } else {
      Array.prototype.forEach.call(root.querySelectorAll('input, textarea, select'), function (el) {
        if (el.id) STATE.values[el.id] = (el.value || '').trim();
      });
    }
  }

  function createRow(vals) {
    var tr = document.createElement('tr');
    ITEM_COLS.forEach(function (col) {
      var td = document.createElement('td');
      var inp = document.createElement('input');
      inp.type = col.type || 'text';
      inp.setAttribute('data-key', col.key);
      if (col.placeholder) inp.placeholder = col.placeholder;
      if (col.step) inp.step = col.step;
      inp.value = (vals && vals[col.key]) || col.defVal || '';
      if (vals && vals._ocr) inp.classList.add('from-ocr');
      td.appendChild(inp);
      tr.appendChild(td);
    });
    return tr;
  }

  function recalcTotals(container) {
    var sum = 0;
    Array.prototype.forEach.call(container.querySelectorAll('tbody tr'), function (row) {
      var v = parseFloat((row.querySelector('[data-key="amount"]') || {}).value);
      if (isFinite(v)) sum += v;
    });
    var subEl = container.querySelector('.subtotal-val');
    if (subEl) subEl.textContent = sum.toFixed(2);
    var tax = parseFloat((container.querySelector('[data-field="rr-tax"]') || {}).value) || 0;
    if (!isFinite(tax)) tax = 0;
    var totEl = container.querySelector('.total-val');
    if (totEl) totEl.textContent = Math.max(0, sum - tax).toFixed(2);
  }

  function bindRow(row, container) {
    Array.prototype.forEach.call(row.querySelectorAll('input'), function (el) {
      el.addEventListener('input', function () {
        el.classList.remove('from-ocr');
        recalcTotals(container);
      });
    });
  }

  function buildItemsStep(s, area) {
    var box = document.createElement('div');
    box.id = s.container;

    if (STATE.values['_ocr_items']) {
      var banner = document.createElement('div');
      banner.className = 'ocr-banner';
      banner.textContent = 'Filled from your receipt — please review before continuing.';
      box.appendChild(banner);
    }

    var wrap = document.createElement('div');
    wrap.className = 'table-wrap';
    var table = document.createElement('table');
    table.className = 'items-table';
    var thead = document.createElement('thead');
    var headRow = document.createElement('tr');
    ITEM_COLS.forEach(function (col) {
      var th = document.createElement('th');
      th.textContent = col.label;
      headRow.appendChild(th);
    });
    thead.appendChild(headRow);
    table.appendChild(thead);

    var tbody = document.createElement('tbody');
    var existing = STATE.values['items'] || [];
    var ocrFlag = !!STATE.values['_ocr_items'];
    if (existing.length) {
      existing.forEach(function (vals) {
        var row = createRow(Object.assign({}, vals, { _ocr: ocrFlag }));
        tbody.appendChild(row);
      });
    } else {
      tbody.appendChild(createRow());
    }
    table.appendChild(tbody);
    wrap.appendChild(table);
    box.appendChild(wrap);

    var addBtn = document.createElement('button');
    addBtn.type = 'button';
    addBtn.className = 'btn btn-ghost';
    addBtn.style.marginTop = '12px';
    addBtn.textContent = '+ Add row';
    addBtn.onclick = function () {
      var newRow = createRow();
      tbody.appendChild(newRow);
      bindRow(newRow, box);
      newRow.querySelector('input').focus();
    };
    box.appendChild(addBtn);

    var totals = document.createElement('div');
    totals.className = 'totals-block';
    totals.innerHTML =
      '<div class="totals-row"><label>Subtotal</label><span>$<span class="subtotal-val">0.00</span></span></div>' +
      '<div class="totals-row"><label>Tax paid (deduct)</label><input type="number" step="0.01" data-field="rr-tax" placeholder="0.00"' +
      (STATE.values['rr-tax'] ? ' value="' + STATE.values['rr-tax'] + '"' : '') + ' /></div>' +
      '<div class="totals-row"><label>Reimbursable</label><span class="totals-value">$<span class="total-val">0.00</span></span></div>';
    box.appendChild(totals);
    area.appendChild(box);

    setTimeout(function () {
      Array.prototype.forEach.call(box.querySelectorAll('tbody tr'), function (row) { bindRow(row, box); });
      Array.prototype.forEach.call(box.querySelectorAll('[data-field]'), function (el) {
        el.addEventListener('input', function () { recalcTotals(box); });
      });
      recalcTotals(box);
    }, 0);
  }

  function buildStep() {
    var s = FORM_STEPS[STATE.step];
    if (!s) return;
    var area = $('step-area');
    area.innerHTML = '';

    var title = document.createElement('h2');
    title.className = 'card-title';
    title.textContent = s.title;
    area.appendChild(title);

    var sub = document.createElement('p');
    sub.className = 'card-sub';
    sub.textContent = s.sub;
    area.appendChild(sub);

    if (s.items) { buildItemsStep(s, area); renderStepBar(); return; }

    var box = document.createElement('div');
    box.id = s.container;
    box.className = 'field-grid';

    s.fields.forEach(function (def) {
      var f = document.createElement('div');
      f.className = 'field';
      if (def.type === 'sportteam') f.style.gridColumn = '1 / -1';

      var lbl = document.createElement('label');
      lbl.htmlFor = def.id;
      lbl.textContent = def.label;
      if (STATE.values['_ocr_' + def.id]) lbl.textContent += ' (from receipt)';
      f.appendChild(lbl);

      if (def.type === 'sportteam') {
        var wrap = document.createElement('div');
        wrap.className = 'composite-row';
        var prefix = document.createElement('span');
        prefix.className = 'composite-prefix';
        prefix.textContent = 'Slam';
        wrap.appendChild(prefix);

        var gradeInp = document.createElement('input');
        gradeInp.id = 'rr-grade';
        gradeInp.placeholder = 'Grade (2-3)';
        gradeInp.style.flex = '0 0 100px';
        gradeInp.value = STATE.values['rr-grade'] || '';
        wrap.appendChild(gradeInp);

        var sportInp = document.createElement('input');
        sportInp.id = 'rr-sport';
        sportInp.placeholder = 'Sport';
        sportInp.style.flex = '1';
        sportInp.value = STATE.values['rr-sport'] || '';
        wrap.appendChild(sportInp);

        var coachInp = document.createElement('input');
        coachInp.id = 'rr-coach';
        coachInp.placeholder = 'Coach last name';
        coachInp.style.flex = '1';
        coachInp.value = STATE.values['rr-coach'] || '';
        wrap.appendChild(coachInp);

        f.appendChild(wrap);
        var preview = document.createElement('div');
        preview.className = 'field-hint';
        var updatePreview = function () {
          preview.innerHTML = 'Appears as: <strong>' + buildSportTeam({
            'rr-grade': gradeInp.value, 'rr-sport': sportInp.value, 'rr-coach': coachInp.value
          }) + '</strong>';
        };
        [gradeInp, sportInp, coachInp].forEach(function (inp) { inp.addEventListener('input', updatePreview); });
        updatePreview();
        f.appendChild(preview);
        box.appendChild(f);
        return;
      }

      var el = document.createElement('input');
      el.type = def.type || 'text';
      el.id = def.id;
      if (def.placeholder) el.placeholder = def.placeholder;
      el.value = STATE.values[def.id] || (def.type === 'date' ? TODAY : '');
      if (STATE.values['_ocr_' + def.id]) {
        el.classList.add('from-ocr');
        el.addEventListener('input', function () { el.classList.remove('from-ocr'); });
      }
      f.appendChild(el);
      box.appendChild(f);
    });

    area.appendChild(box);
    renderStepBar();
  }

  function lastName(fullName) {
    var parts = (fullName || '').trim().split(/\s+/);
    return parts[parts.length - 1] || 'unknown';
  }
  function safeName(str) {
    return (str || '').replace(/[^a-zA-Z0-9]/g, '').substring(0, 20) || 'unknown';
  }

  async function buildPdfDoc() {
    if (typeof PDFLib === 'undefined') throw new Error('PDF library not loaded.');
    var PDFDocument = PDFLib.PDFDocument;
    var StandardFonts = PDFLib.StandardFonts;
    var rgb = PDFLib.rgb;
    var v = STATE.values;
    var items = v['items'] || [];
    var black = rgb(0.11, 0.11, 0.11);

    var doc;
    try {
      var resp = await fetch('./templates/reimbursement_blank.pdf');
      if (!resp.ok) throw new Error('template fetch failed');
      doc = await PDFDocument.load(await resp.arrayBuffer());
    } catch (e) {
      doc = await PDFDocument.create();
      doc.addPage([612, 792]);
    }

    var font = await doc.embedFont(StandardFonts.Helvetica);
    var page = doc.getPages()[0];
    function t(x, y, val, size) {
      var str = String(val || '').trim();
      if (!str) return;
      page.drawText(str, { x: x, y: y, size: size || 9, font: font, color: black });
    }

    var sportTeam = buildSportTeam(v);
    t(42, 647, v['rr-date']);
    t(120, 647, v['rr-name'], 9);
    t(246, 647, sportTeam, 9);
    t(462, 647, v['rr-position'], 9);

    var RR_Y = [583, 565, 546, 528, 510, 491, 473, 455, 437, 419];
    items.forEach(function (item, i) {
      if (i >= RR_Y.length) return;
      var y = RR_Y[i];
      t(40, y, v['rr-date'], 8);
      t(100, y, item.vendor, 8);
      t(190, y, item.desc, 8);
      var qtyNum = parseFloat(item.qty) || 1;
      var amtNum = parseFloat(item.amount) || 0;
      t(410, y, String(qtyNum), 8);
      if (amtNum) {
        var rate = qtyNum > 0 ? (amtNum / qtyNum) : amtNum;
        t(436, y, rate.toFixed(2), 8);
        t(500, y, amtNum.toFixed(2), 8);
      }
    });

    var total = parseFloat(v['_total'] || v['_subtotal'] || '0');
    if (total > 0) t(500, 401, total.toFixed(2), 10);

    return { bytes: await doc.save(), filename: safeName(lastName(v['rr-name'])) + '_RRF.pdf' };
  }

  function downloadBytes(bytes, filename) {
    var blob = new Blob([bytes], { type: 'application/pdf' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
    setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
  }

  async function generatePDF() {
    try {
      saveStep();
      var result = await buildPdfDoc();
      downloadBytes(result.bytes, result.filename);
    } catch (err) {
      alert('PDF generation failed: ' + err.message);
    }
  }

  async function sendToAD() {
    try {
      saveStep();
      var result = await buildPdfDoc();
      var file = new File([result.bytes], result.filename, { type: 'application/pdf' });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], title: 'Coach Reimbursement', text: 'Please send this to ' + AD_EMAIL });
      } else {
        downloadBytes(result.bytes, result.filename);
        var subject = encodeURIComponent(result.filename.replace(/\.pdf$/, '').replace(/_/g, ' '));
        var body = encodeURIComponent('Hi Kenny,\n\nAttached is my completed reimbursement form.\n\nThanks!');
        setTimeout(function () { window.location.href = 'mailto:' + AD_EMAIL + '?subject=' + subject + '&body=' + body; }, 300);
      }
    } catch (err) {
      alert('Could not prepare email: ' + err.message);
    }
  }

  function resetAll() {
    STATE.step = 0;
    STATE.values = {};
    STATE.ocrRunning = false;
    STATE.scanned = false;
    resetUploadUi();
    show('screen-receipt');
  }

  window.app = {
    skipUpload: skipUpload,
    nextFromReceipt: nextFromReceipt,
    stepBack: stepBack,
    stepNext: stepNext,
    generatePDF: generatePDF,
    sendToAD: sendToAD,
    resetAll: resetAll
  };

  setupUpload();
  renderStepBar();
})();
</script>
